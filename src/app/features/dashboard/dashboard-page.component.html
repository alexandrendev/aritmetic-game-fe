<main class="dashboard-page">
  <section class="dashboard-card">

    <header class="dash-header">
      <p class="tag">⚡ O Jogo</p>
      <h1>{{ greeting() }}</h1>
      <p class="subtitle">Crie uma sala, compartilhe o código e seus alunos entram na hora.</p>
    </header>

    @if (loading()) {
      <p class="loading-text">Carregando perfil...</p>
    } @else {
      <div class="profile-row">
        <div class="profile-avatar">{{ displayName().charAt(0).toUpperCase() }}</div>
        <div class="profile-info">
          <p class="profile-name">{{ displayName() }}</p>
          <p class="profile-email">{{ user()?.email }}</p>
        </div>
      </div>

      <button type="button" class="btn btn-create" (click)="createGame()">
        ➕ Criar Nova Sala
      </button>
    }

    <button type="button" class="btn btn-logout" (click)="logout()">Sair da conta</button>

  </section>
</main>
