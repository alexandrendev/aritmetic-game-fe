<main class="dashboard-page">
  <section class="dashboard-card">
    <p class="tag">Math Quest</p>
    <h1>{{ greeting() }}</h1>

    @if (loading()) {
      <p class="subtitle">Carregando seu perfil...</p>
    } @else {
      <p class="subtitle">
        Bem-vindo ao Math Quest! Crie uma sala ou entre em uma existente para começar a jogar.
      </p>

      <div class="stats" aria-label="Informacoes do aluno">
        <article>
          <h2>Nome</h2>
          <p>{{ displayName() }}</p>
        </article>
        <article>
          <h2>Email</h2>
          <p>{{ user()?.email }}</p>
        </article>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-primary" (click)="createGame()">
          ➕ Criar Nova Sala
        </button>
        <button type="button" class="btn btn-secondary" (click)="joinGame()">
          🎮 Entrar em Sala
        </button>
      </div>
    }

    <button type="button" (click)="logout()" class="btn btn-logout">Sair</button>
  </section>
</main>
